<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>體育器材管理系統 - Elite Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --card-bg: #1a1a1a;
      --accent-gold: #d4af37;
      --text-main: #e0e0e0;
      --text-dim: #888;
      --border-color: #333;
    }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
    }

    header {
      padding-bottom: 30px;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    .school-branding {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .vertical-line {
      width: 4px;
      height: 40px;
      background: #3498db; /* 參考截圖中的藍色 */
      border-radius: 2px;
    }

    .school-info {
      display: flex;
      flex-direction: column;
    }

    .school-name-zh {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
    }

    .school-name-en {
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-title-area {
      display: flex;
      justify-content: space-between;
      align-items: center; /* 讓右邊標籤居中對齊 */
      margin-bottom: 20px;
    }

    .title-container h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      line-height: 1.1;
    }

    .platform-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 5px;
    }

    .platform-name {
      font-size: 20px;
      color: var(--accent-gold);
      letter-spacing: 2px;
      font-weight: 500;
    }

    .version-tag {
      background: rgba(212, 175, 55, 0.1);
      color: var(--accent-gold);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(212, 175, 55, 0.3);
      text-transform: uppercase;
    }

    .sub-title {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 10px;
    }

    .status-badge {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: #222;
      border: 1px solid #444;
      color: var(--text-dim);
    }

    /* 架子容器 */
    .racks-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
    }

    .rack-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .rack-header {
      font-size: 18px;
      color: var(--accent-gold);
      margin-bottom: 15px;
      border-left: 3px solid var(--accent-gold);
      padding-left: 10px;
    }

    /* 層級 Row */
    .level-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 5px;
    }

    .level-label {
      width: 60px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    .slots-row {
      display: flex;
      flex: 1;
      gap: 5px;
      flex-wrap: wrap; /* 支援備品區 8 格一排 */
    }

    /* 備品區專用樣式 */
    .spares-summary {
      background: rgba(255,255,255,0.03);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px dashed #333;
    }
    .spares-summary-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    .spares-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .spare-tag {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 13px;
      color: #ddd;
    }
    .toggle-btn {
      width: 100%;
      background: none;
      border: 1px solid #333;
      color: #777;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 15px;
      transition: all 0.2s;
    }
    .toggle-btn:hover {
      background: #222;
      color: #fff;
      border-color: #555;
    }

    /* 格子 Slot */
    .slot {
      flex: 1;
      height: 60px;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      position: relative;
    }

    .slot:hover {
      border-color: var(--accent-gold);
      background: #181818;
    }

    .slot.big { flex: 2.05; background: linear-gradient(135deg, #2c3e50 0%, #000 100%); border: 1px solid var(--accent-gold); }
    .slot.has-item { background: rgba(212, 175, 55, 0.05); }

    .slot-id { font-size: 9px; color: #555; position: absolute; top: 3px; left: 5px; }
    .item-name { font-size: 13px; font-weight: 400; text-align: center; color: var(--text-main); }
    .item-qty { font-size: 11px; color: var(--accent-gold); margin-top: 2px; }

    /* 編輯彈窗 */
    #modalOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: #1a1a1a;
      width: 350px;
      padding: 25px;
      border-radius: 15px;
      border: 1px solid var(--accent-gold);
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
    }

    .modal-title { font-size: 18px; color: var(--accent-gold); margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
    select, input, textarea { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
    textarea { height: 150px; resize: vertical; line-height: 1.5; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; }
    .btn-save { background: var(--accent-gold); color: #000; }
    .btn-cancel { background: #444; color: #fff; }
    .btn-delete { background: #e74c3c; color: #fff; border: none; }
    .btn-delete:hover { background: #c0392b; }

    #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent-gold); }

    /* 統計面板樣式 */
    .stats-panel {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      flex: 1;
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: var(--accent-gold);
      transform: translateY(-5px);
    }
    .stat-value { font-size: 28px; font-weight: 600; color: var(--accent-gold); }
    .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

    /* 警告樣式 */
    .stat-card.alert { background: rgba(255, 0, 0, 0.1); border-color: rgba(255, 0, 0, 0.3); }
    .stat-card.alert .stat-value { color: #ff4444; }
    .stat-card.alert .stat-label { color: #ff8888; }
    .pulse { animation: pulse-red 2s infinite; }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
    }
    /* 列印專用樣式 - 修正版 */
    @media print {
      body > *:not(#printArea) { display: none !important; }
      #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; background: #fff !important; }
      .print-page { 
        page-break-after: always; 
        padding: 20px; 
        border: 4px solid #000 !important; 
        margin-bottom: 20px; 
        color: #000 !important; 
        background: #fff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .print-title { font-size: 48px; font-weight: 700; text-align: center; margin-bottom: 30px; border: 4px solid #000; padding: 10px; }
      .print-grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        grid-template-rows: repeat(3, 1fr); 
        gap: 10px; 
        height: 80vh;
      }
      .print-slot { 
        border: 2px solid #000 !important; 
        border-radius: 15px; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        text-align: center; 
        padding: 5px;
        overflow: hidden;
      }
      .print-slot.big { grid-column: span 2; }
      .print-item-name { font-size: 24px; font-weight: 700; color: #000 !important; }
      .print-item-note { font-size: 14px; margin-top: 5px; color: #333 !important; line-height: 1.2; }
    }
    #printArea { display: none; }
  </style>
</head>
<body>

  <header>
    <div class="school-branding">
      <div class="vertical-line"></div>
      <div class="school-info">
        <div class="school-name-zh">臺中市北屯區廍子國民小學</div>
        <div class="school-name-en">BUZI ELEMENTARY SCHOOL</div>
      </div>
    </div>
    
    <div class="main-title-area">
      <div class="title-container">
        <h1>體育器材</h1>
        <div class="platform-line">
          <span class="platform-name">數位管理平台</span>
          <span class="version-tag">v2.5 Beta</span>
        </div>
        <div class="sub-title">及時監測體育器材庫存與擺放位置</div>
      </div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <button onclick="generatePrintLabels()" class="status-badge" style="background:var(--accent-gold); color:#000; cursor:pointer; font-weight:bold; border:none;">🖨️ 列印架位標籤</button>
        <div id="loadingStatus" class="status-badge">同步中...</div>
      </div>
    </div>
  </header>

  <!-- 統計面板 -->
  <div id="statsPanel" class="stats-panel">
    <div class="stat-card">
      <div class="stat-value" id="statOccupied">-</div>
      <div class="stat-label">已佔用籃子</div>
    </div>
    <div class="stat-card" onclick="showEquipmentDetail()" style="cursor: pointer;">
      <div class="stat-value" id="statTotalItems">-</div>
      <div class="stat-label">器材總數量 (點擊查看)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statSpace">-</div>
      <div class="stat-label">空間使用率</div>
    </div>
    <div class="stat-card" id="alertCard" onclick="showRestockDetail()" style="cursor: pointer;">
      <div class="stat-value" id="statAlert">0</div>
      <div class="stat-label">待補貨項目 (點擊查看)</div>
    </div>
  </div>

  <div id="loader">載入中...</div>
  <div id="racksContainer" class="racks-container"></div>
  
  <!-- 隱藏的列印區 -->
  <div id="printArea"></div>

  <!-- 編輯彈窗 -->
  <div id="modalOverlay">
    <div class="modal">
      <div id="modalTitle" class="modal-title">位置編輯</div>
      
      <!-- 模式一：編輯位置表單 -->
      <form id="editForm">
        <input type="hidden" id="editSlotId">
        <input type="hidden" id="editRackId">
        <input type="hidden" id="editLevel">
        <div class="form-group"><label>器材名稱</label><select id="equipSelect"><option value="">(空)</option></select></div>
        <div class="form-group"><label>數量</label><input type="number" id="qtyInput" min="0" value="0"></div>
        <div class="form-group"><label>籃子大小</label><select id="sizeSelect"><option value="小">小籃子 (1格)</option><option value="大">大籃子 (2格 / 固定向右合併)</option></select></div>
        <div class="form-group"><label>備註內容 (如顏色、尺寸、細項)</label><textarea id="noteInput" placeholder="例如：&#10;紅*10, 藍*5&#10;特大號*2"></textarea></div>
        <div class="btn-group">
          <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
          <button type="button" class="btn-delete" onclick="clearThisSlot()">清空此格</button>
          <button type="submit" class="btn-save">儲存更新</button>
        </div>
      </form>

      <!-- 模式二：詳細統計清單 -->
      <div id="detailContent" style="display:none;">
        <div id="detailList" style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; max-height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
        <div class="btn-group">
          <button type="button" class="btn-cancel" onclick="closeModal()" style="background:var(--accent-gold); color:#000;">關閉</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzkPjn7eBoY1UTTEH_ZIUHEbCctP5Nv_ED_0ZZnXe9S6LVY0k85BjJ7nLP83UHdJaCi/exec';

    let inventory = [];
    let equipmentList = [];

    window.onload = () => {
      fetchData();
      fetchEquipmentList();
    };

    async function fetchData() {
      document.getElementById('loadingStatus').textContent = '同步中...';
      try {
        const response = await fetch(`${API_URL}?action=getInventory`);
        inventory = await response.json();
        renderRacks(); // 資料回來就畫一次
        document.getElementById('loader').style.display = 'none';
        document.getElementById('loadingStatus').textContent = '已同步';
      } catch (e) {
        console.error("抓取庫存失敗", e);
      }
    }

    async function fetchEquipmentList() {
      try {
        const response = await fetch(`${API_URL}?action=getEquipment`);
        equipmentList = await response.json();
        renderRacks(); // 資料回來也畫一次，確保預警數字更新
        
        const select = document.getElementById('equipSelect');
        select.innerHTML = '<option value="">(空)</option>';
        equipmentList.forEach(item => {
          const opt = document.createElement('option');
          opt.value = item.name; opt.textContent = item.name;
          select.appendChild(opt);
        });
      } catch (e) {
        console.error("抓取器材清單失敗", e);
      }
    }

    function renderRacks() {
      const container = document.getElementById('racksContainer');
      container.innerHTML = '';
      
      // --- 更新統計數據 ---
      const totalSlots = inventory.filter(d => !d.Status.includes('被')).length;
      const occupied = inventory.filter(d => d.Equipment_Name && !d.Status.includes('被')).length;
      const totals = {};
      inventory.forEach(d => {
        if (d.Equipment_Name) totals[d.Equipment_Name] = (totals[d.Equipment_Name] || 0) + parseInt(d.Quantity);
      });
      const totalQty = Object.values(totals).reduce((a, b) => a + b, 0);
      
      // 計算待補貨項目
      let lowStockCount = 0;
      if (equipmentList && equipmentList.length > 0) {
        equipmentList.forEach(item => {
          const current = totals[item.name] || 0;
          if (current < item.safety) {
            console.log(`[低庫存預警] ${item.name}: 當前 ${current} < 安全 ${item.safety}`);
            lowStockCount++;
          }
        });
      }

      document.getElementById('statOccupied').textContent = occupied;
      document.getElementById('statTotalItems').textContent = totalQty;
      document.getElementById('statSpace').textContent = ((occupied / totalSlots) * 100).toFixed(1) + '%';
      
      const alertVal = document.getElementById('statAlert');
      const alertCard = document.getElementById('alertCard');
      alertVal.textContent = lowStockCount;
      if (lowStockCount > 0) {
        alertCard.classList.add('alert', 'pulse');
      } else {
        alertCard.classList.remove('alert', 'pulse');
      }
      // ------------------

      // 1. 重新排序架位：A-G ➔ 樂活 ➔ 備品區
      const rackIds = [...new Set(inventory.map(item => item.Rack_ID))].sort((a, b) => {
        const order = (name) => {
          if (name === "備品區") return 999;
          if (name === "其他器材") return 998;
          if (name.includes("樂活教室")) return 900 + (name.includes("B") ? 1 : 0);
          return name.charCodeAt(0); // A-G 會按字母順序
        };
        return order(a) - order(b);
      });

      rackIds.forEach(rackId => {
        const card = document.createElement('div');
        card.className = 'rack-card';
        
        // 特殊處理備品區與其他器材標題
        const isInventoryMode = rackId === "備品區" || rackId === "其他器材";
        const displayTitle = rackId;
        let html = `<div class="rack-header">區域 ${displayTitle}</div>`;
        
        if (isInventoryMode) {
          // --- 庫存清單模式 ---
          html += `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:8px; padding:10px;">`;
          
          const areaSlots = inventory.filter(d => d.Rack_ID === rackId);
          areaSlots.forEach((slot, index) => {
            const currentQty = slot.Quantity || 0;
            const itemName = slot.Equipment_Name || `(格位 ${index + 1})`;
            
            html += `
              <div class="slot ${slot.Equipment_Name ? 'has-item' : ''}" style="height:70px;" onclick="openModal(${JSON.stringify(slot).replace(/"/g, '&quot;')})">
                <div class="item-name" style="font-size:12px;">${itemName}</div>
                <div class="item-qty" style="font-size:16px; font-weight:700;">${currentQty}</div>
              </div>`;
          });
          html += `</div>`;
          card.innerHTML = html;
          container.appendChild(card);
          return; // 結束備品區處理，不執行後面的層級渲染
        }

        // --- 一般架位：層級渲染模式 ---
        html += `<div id="container-${rackId}"></div>`;
        card.innerHTML = html;
        container.appendChild(card);
        
        const levelsContainer = card.querySelector(`#container-${rackId}`);
        const rackData = inventory.filter(d => d.Rack_ID === rackId);
        const levels = [...new Set(rackData.map(d => d.Level))].sort((a, b) => b - a);

        levels.forEach(l => {
          const levelRow = document.createElement('div');
          levelRow.className = 'level-row';
          levelRow.innerHTML = `<div class="level-label">Level ${l}</div>`;
          const slotsRow = document.createElement('div');
          slotsRow.className = 'slots-row';
          const levelData = rackData.filter(d => d.Level == l);
          
          for (let b = 1; b <= 4; b++) {
            const slotData = levelData.find(d => d.Slot_ID.endsWith(`-${b}`));
            if (!slotData || (slotData.Status && slotData.Status.includes('被'))) continue;
            
            const slotDiv = document.createElement('div');
            slotDiv.className = 'slot';
            if (slotData.Basket_Size === '大') slotDiv.classList.add('big');
            if (slotData.Equipment_Name) slotDiv.classList.add('has-item');
            
            slotDiv.innerHTML = `
              <div class="slot-id">${slotData.Slot_ID}</div>
              <div class="item-name">${slotData.Equipment_Name || ''}</div>
              <div class="item-qty">${slotData.Quantity > 0 ? slotData.Quantity : ''}</div>
            `;
            slotDiv.onclick = () => openModal(slotData);
            slotsRow.appendChild(slotDiv);
          }
          levelRow.appendChild(slotsRow);
          card.appendChild(levelRow);
        });
        container.appendChild(card);
      });
    }

    function openModal(data) {
      // 切換回編輯模式
      document.getElementById('editForm').style.display = 'block';
      document.getElementById('detailContent').style.display = 'none';

      document.getElementById('editSlotId').value = data.Slot_ID;
      document.getElementById('editRackId').value = data.Rack_ID;
      document.getElementById('editLevel').value = data.Level;
      document.getElementById('modalTitle').textContent = `編輯位置: ${data.Slot_ID}`;
      document.getElementById('equipSelect').value = data.Equipment_Name || '';
      document.getElementById('qtyInput').value = data.Quantity || 0;
      document.getElementById('sizeSelect').value = data.Basket_Size || '小';
      document.getElementById('noteInput').value = data.Note || '';
      
      const slotNum = parseInt(data.Slot_ID.split('-').pop());
      document.getElementById('sizeSelect').disabled = (slotNum === 4);
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    function showEquipmentDetail() {
      document.getElementById('editForm').style.display = 'none';
      document.getElementById('detailContent').style.display = 'block';
      
      const rackTotals = {};
      const spareTotals = {};
      
      inventory.forEach(d => {
        if (!d.Equipment_Name || d.Quantity <= 0) return;
        if (d.Rack_ID === "備品區") {
          spareTotals[d.Equipment_Name] = (spareTotals[d.Equipment_Name] || 0) + parseInt(d.Quantity);
        } else {
          rackTotals[d.Equipment_Name] = (rackTotals[d.Equipment_Name] || 0) + parseInt(d.Quantity);
        }
      });

      const allEquip = [...new Set([...Object.keys(rackTotals), ...Object.keys(spareTotals)])].sort();
      let html = '';
      
      if (allEquip.length === 0) {
        html += '<div style="grid-column: span 2; text-align: center; color: #888; padding: 20px;">目前無庫存器材</div>';
      } else {
        allEquip.forEach(name => {
          const r = rackTotals[name] || 0;
          const s = spareTotals[name] || 0;
          html += `
            <div style="background:#111; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column;">
              <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:4px;">
                <span style="font-size: 14px; color: #ddd; font-weight:600;">${name}</span>
                <span style="font-size: 16px; color: var(--accent-gold); font-weight:700;">${r + s}</span>
              </div>
              <div style="font-size: 11px; color: #777; display:flex; gap:10px;">
                <span>架位: ${r}</span>
                <span>備品: ${s}</span>
              </div>
            </div>`;
        });
      }
      
      document.getElementById('modalTitle').textContent = '器材庫存分布詳情';
      document.getElementById('detailList').innerHTML = html;
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function showRestockDetail() {
      document.getElementById('editForm').style.display = 'none';
      document.getElementById('detailContent').style.display = 'block';
      
      const rackTotals = {};
      const spareTotals = {};
      inventory.forEach(d => {
        if (!d.Equipment_Name) return;
        if (d.Rack_ID === "備品區") {
          spareTotals[d.Equipment_Name] = (spareTotals[d.Equipment_Name] || 0) + parseInt(d.Quantity);
        } else {
          rackTotals[d.Equipment_Name] = (rackTotals[d.Equipment_Name] || 0) + parseInt(d.Quantity);
        }
      });

      let html = '';
      let restockList = equipmentList.filter(item => {
        const total = (rackTotals[item.name] || 0) + (spareTotals[item.name] || 0);
        return total < item.safety;
      });
      
      if (restockList.length === 0) {
        html += '<div style="grid-column: span 2; text-align: center; color: #888; padding: 20px;">所有器材庫存充裕</div>';
      } else {
        restockList.forEach(item => {
          const r = rackTotals[item.name] || 0;
          const s = spareTotals[item.name] || 0;
          const current = r + s;
          const diff = item.safety - current;
          html += `
            <div style="background:rgba(255,68,68,0.05); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,68,68,0.2); display: flex; flex-direction: column;">
              <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <span style="font-size: 14px; color: #ddd; font-weight:600;">${item.name}</span>
                <span style="font-size: 12px; color: #ff8888; font-weight:700;">缺 ${diff}</span>
              </div>
              <div style="font-size: 11px; color: #888; display:flex; gap:10px;">
                <span>總量: ${current} / 安全: ${item.safety}</span>
              </div>
              <div style="font-size: 10px; color: #666; margin-top:2px;">
                (架位: ${r} / 備品: ${s})
              </div>
            </div>`;
        });
      }
      
      document.getElementById('modalTitle').textContent = '待補貨器材分佈';
      document.getElementById('detailList').innerHTML = html;
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    async function clearThisSlot() {
      if (!confirm('確定要清空這個格子的所有資料嗎？')) return;
      document.getElementById('equipSelect').value = '';
      document.getElementById('qtyInput').value = 0;
      document.getElementById('sizeSelect').value = '小';
      
      const form = document.getElementById('editForm');
      form.dispatchEvent(new Event('submit'));
    }

    function toggleSpares(btn) {
      const container = document.getElementById('container-備品區');
      const isHidden = container.style.display === 'none';
      container.style.display = isHidden ? 'block' : 'none';
      btn.textContent = isHidden ? '收起詳細格位' : '顯示/編輯詳細格位';
    }

    document.getElementById('editForm').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        action: 'update',
        slotId: document.getElementById('editSlotId').value,
        rackId: document.getElementById('editRackId').value,
        level: parseInt(document.getElementById('editLevel').value),
        equipment: document.getElementById('equipSelect').value,
        qty: parseInt(document.getElementById('qtyInput').value),
        size: document.getElementById('sizeSelect').value,
        note: document.getElementById('noteInput').value,
        operator: 'GitHub 網頁端'
      };
      closeModal();
      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        fetchData();
      } catch (err) { alert('更新失敗'); }
    };

    function generatePrintLabels() {
      const printArea = document.getElementById('printArea');
      printArea.innerHTML = '';
      
      const rackIds = [...new Set(inventory.map(item => item.Rack_ID))].sort();
      
      rackIds.forEach(rackId => {
        if (rackId === "備品區" || rackId === "其他器材") return;
        
        const rackData = inventory.filter(d => d.Rack_ID === rackId);
        
        const page = document.createElement('div');
        page.className = 'print-page';
        page.innerHTML = `<div class="print-title">架位 ${rackId}</div>`;
        
        const grid = document.createElement('div');
        grid.className = 'print-grid';
        
        // 依照 PDF 樣式與實體架位：Level 3 在上，Level 1 在下
        for (let l = 3; l >= 1; l--) {
          for (let s = 1; s <= 4; s++) {
            const slot = rackData.find(d => d.Level == l && d.Slot_ID.endsWith(`-${s}`));
            if (!slot) {
              const emptyDiv = document.createElement('div');
              emptyDiv.className = 'print-slot';
              grid.appendChild(emptyDiv);
              continue;
            }
            
            // 跳過被合併的格子
            if (slot.Status && slot.Status.includes('被')) continue;
            
            const slotDiv = document.createElement('div');
            slotDiv.className = 'print-slot';
            if (slot.Basket_Size === '大') slotDiv.classList.add('big');
            
            slotDiv.innerHTML = `
              <div class="print-item-name">${slot.Equipment_Name || ''}</div>
              <div class="print-item-note">${slot.Note || ''}</div>
            `;
            grid.appendChild(slotDiv);
          }
        }
        page.appendChild(grid);
        printArea.appendChild(page);
      });
      
      // 給瀏覽器一點時間渲染內容後再列印
      setTimeout(() => {
        window.print();
      }, 500);
    }
  </script>
