<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>體育器材管理系統 - Elite Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --card-bg: #1a1a1a;
      --accent-gold: #d4af37;
      --text-main: #e0e0e0;
      --text-dim: #888;
      --border-color: #333;
    }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--accent-gold);
      margin-bottom: 30px;
    }

    h1 {
      margin: 0;
      font-weight: 300;
      letter-spacing: 2px;
      color: var(--accent-gold);
      text-transform: uppercase;
    }

    .status-badge {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: #222;
      border: 1px solid #444;
      color: var(--text-dim);
    }

    /* 架子容器 */
    .racks-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
    }

    .rack-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .rack-header {
      font-size: 18px;
      color: var(--accent-gold);
      margin-bottom: 15px;
      border-left: 3px solid var(--accent-gold);
      padding-left: 10px;
    }

    /* 層級 Row */
    .level-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 5px;
    }

    .level-label {
      width: 60px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    .slots-row {
      display: flex;
      flex: 1;
      gap: 5px;
    }

    /* 格子 Slot */
    .slot {
      flex: 1;
      height: 60px;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      position: relative;
    }

    .slot:hover {
      border-color: var(--accent-gold);
      background: #181818;
    }

    .slot.big { flex: 2.05; background: linear-gradient(135deg, #2c3e50 0%, #000 100%); border: 1px solid var(--accent-gold); }
    .slot.has-item { background: rgba(212, 175, 55, 0.05); }

    .slot-id { font-size: 9px; color: #555; position: absolute; top: 3px; left: 5px; }
    .item-name { font-size: 13px; font-weight: 400; text-align: center; color: var(--text-main); }
    .item-qty { font-size: 11px; color: var(--accent-gold); margin-top: 2px; }

    /* 編輯彈窗 */
    #modalOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: #1a1a1a;
      width: 350px;
      padding: 25px;
      border-radius: 15px;
      border: 1px solid var(--accent-gold);
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
    }

    .modal-title { font-size: 18px; color: var(--accent-gold); margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
    select, input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; }
    .btn-save { background: var(--accent-gold); color: #000; }
    .btn-cancel { background: #444; color: #fff; }

    #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent-gold); }
  </style>
</head>
<body>

  <header>
    <h1>體育器材管理系統</h1>
    <div id="loadingStatus" class="status-badge">同步中...</div>
  </header>

  <div id="loader">載入中...</div>
  <div id="racksContainer" class="racks-container"></div>

  <!-- 編輯彈窗 -->
  <div id="modalOverlay">
    <div class="modal">
      <div id="modalTitle" class="modal-title">位置編輯</div>
      <form id="editForm">
        <input type="hidden" id="editSlotId">
        <input type="hidden" id="editRackId">
        <input type="hidden" id="editLevel">
        <div class="form-group"><label>器材名稱</label><select id="equipSelect"><option value="">(空)</option></select></div>
        <div class="form-group"><label>數量</label><input type="number" id="qtyInput" min="0" value="0"></div>
        <div class="form-group"><label>籃子大小</label><select id="sizeSelect"><option value="小">小籃子 (1格)</option><option value="大">大籃子 (2格 / 固定向右合併)</option></select></div>
        <div class="btn-group">
          <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
          <button type="submit" class="btn-save">儲存更新</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzkPjn7eBoY1UTTEH_ZIUHEbCctP5Nv_ED_0ZZnXe9S6LVY0k85BjJ7nLP83UHdJaCi/exec';

    let inventory = [];
    let equipmentList = [];

    window.onload = () => {
      fetchData();
      fetchEquipmentList();
    };

    async function fetchData() {
      document.getElementById('loadingStatus').textContent = '同步中...';
      try {
        const response = await fetch(`${API_URL}?action=getInventory`);
        inventory = await response.json();
        renderRacks();
        document.getElementById('loader').style.display = 'none';
        document.getElementById('loadingStatus').textContent = '已同步';
      } catch (err) {
        document.getElementById('loader').innerHTML = `<div style="color:red;text-align:center;">連線失敗：${err.message}</div>`;
      }
    }

    async function fetchEquipmentList() {
      try {
        const response = await fetch(`${API_URL}?action=getEquipment`);
        equipmentList = await response.json();
        const select = document.getElementById('equipSelect');
        equipmentList.forEach(item => {
          const opt = document.createElement('option');
          opt.value = item; opt.textContent = item;
          select.appendChild(opt);
        });
      } catch (e) {}
    }

    function renderRacks() {
      const container = document.getElementById('racksContainer');
      container.innerHTML = '';
      const rackIds = [...new Set(inventory.map(item => item.Rack_ID))];
      rackIds.forEach(rackId => {
        const card = document.createElement('div');
        card.className = 'rack-card';
        card.innerHTML = `<div class="rack-header">架位 ${rackId}</div>`;
        for (let l = 1; l <= 4; l++) {
          const levelRow = document.createElement('div');
          levelRow.className = 'level-row';
          levelRow.innerHTML = `<div class="level-label">Level ${l}</div>`;
          const slotsRow = document.createElement('div');
          slotsRow.className = 'slots-row';
          const levelData = inventory.filter(d => d.Rack_ID === rackId && d.Level == l);
          for (let b = 1; b <= 4; b++) {
            const slotData = levelData.find(d => d.Slot_ID.endsWith(`-${b}`));
            if (!slotData || (slotData.Status && slotData.Status.includes('被'))) continue;
            const slotDiv = document.createElement('div');
            slotDiv.className = 'slot';
            if (slotData.Basket_Size === '大') slotDiv.classList.add('big');
            if (slotData.Equipment_Name) slotDiv.classList.add('has-item');
            slotDiv.innerHTML = `<div class="slot-id">${slotData.Slot_ID}</div><div class="item-name">${slotData.Equipment_Name || ''}</div><div class="item-qty">${slotData.Quantity > 0 ? slotData.Quantity : ''}</div>`;
            slotDiv.onclick = () => openModal(slotData);
            slotsRow.appendChild(slotDiv);
          }
          levelRow.appendChild(slotsRow); card.appendChild(levelRow);
        }
        container.appendChild(card);
      });
    }

    function openModal(data) {
      document.getElementById('editSlotId').value = data.Slot_ID;
      document.getElementById('editRackId').value = data.Rack_ID;
      document.getElementById('editLevel').value = data.Level;
      document.getElementById('modalTitle').textContent = `編輯位置: ${data.Slot_ID}`;
      document.getElementById('equipSelect').value = data.Equipment_Name || '';
      document.getElementById('qtyInput').value = data.Quantity || 0;
      document.getElementById('sizeSelect').value = data.Basket_Size || '小';
      const slotNum = parseInt(data.Slot_ID.split('-').pop());
      document.getElementById('sizeSelect').disabled = (slotNum % 2 === 0);
      document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    document.getElementById('editForm').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        action: 'update',
        slotId: document.getElementById('editSlotId').value,
        rackId: document.getElementById('editRackId').value,
        level: parseInt(document.getElementById('editLevel').value),
        equipment: document.getElementById('equipSelect').value,
        qty: parseInt(document.getElementById('qtyInput').value),
        size: document.getElementById('sizeSelect').value,
        operator: 'GitHub 網頁端'
      };
      closeModal();
      try {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        fetchData();
      } catch (err) { alert('更新失敗'); }
    };
  </script>
</body>
</html>
